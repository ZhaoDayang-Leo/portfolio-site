<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exhibition - Waitlist</title>
    <style>
      :root {
        --color-bg: #f2f2f2;
        --color-text-primary: #111111;
        --color-text-secondary: #777777;
        --color-border-subtle: #d8d8d8;
        --font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Inter", sans-serif;
        --font-size-micro: 9px;
        --font-size-base: 14px;
        --font-size-lead: 20px;
        --spacing-edge: 4vw;
        --spacing-gallery-gap: 1.5vw;
        --radius-image: 2px;
        --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.08);
        --transition-slow: 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-color: var(--color-bg);
        color: var(--color-text-primary);
        font-family: var(--font-family);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .text-micro {
        color: var(--color-text-secondary);
        font-size: var(--font-size-micro);
        font-weight: 500;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }

      .exhibition-header {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1.5rem;
        padding: var(--spacing-edge);
      }

      .exhibition-stage {
        position: relative;
        flex-grow: 1;
        display: flex;
        align-items: center;
        width: 100%;
        overflow: hidden;
      }

      .exhibition-stage::before,
      .exhibition-stage::after {
        content: "";
        position: absolute;
        top: 0;
        z-index: 10;
        width: 15vw;
        height: 100%;
        pointer-events: none;
      }

      .exhibition-stage::before {
        left: 0;
        background: linear-gradient(to right, var(--color-bg) 0%, transparent 100%);
      }

      .exhibition-stage::after {
        right: 0;
        background: linear-gradient(to left, var(--color-bg) 0%, transparent 100%);
      }

      .gallery-track {
        position: relative;
        display: flex;
        align-items: center;
        gap: var(--spacing-gallery-gap);
        width: 100%;
        height: 100%;
        padding: 0 20vw;
        overflow-x: scroll;
        overflow-y: hidden;
        scroll-behavior: smooth;
        scroll-snap-type: x mandatory;
        cursor: grab;
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      .gallery-track:active {
        cursor: grabbing;
      }

      .gallery-track::-webkit-scrollbar {
        display: none;
      }

      .gallery-item {
        flex: 0 0 auto;
        width: auto;
        height: 45vh;
        aspect-ratio: 3 / 4;
        object-fit: cover;
        border-radius: var(--radius-image);
        background-color: #e0e0e0;
        box-shadow: var(--shadow-soft);
        filter: grayscale(15%) contrast(0.95);
        scroll-snap-align: center;
        user-select: none;
        -webkit-user-drag: none;
        transition: transform var(--transition-slow), filter var(--transition-slow);
      }

      .gallery-item:hover {
        transform: scale(1.03);
        filter: grayscale(0%) contrast(1.05);
      }

      .exhibition-footer {
        z-index: 20;
        flex-shrink: 0;
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: clamp(2rem, 10vw, 8rem);
        padding: var(--spacing-edge);
        border-top: 1px solid var(--color-border-subtle);
        background-color: var(--color-bg);
      }

      .exhibition-statement {
        max-width: 380px;
      }

      .exhibition-statement h1 {
        margin: 0 0 0.75rem;
        color: var(--color-text-primary);
        font-size: var(--font-size-lead);
        font-weight: 400;
        letter-spacing: -0.02em;
        line-height: 1.3;
      }

      .exhibition-statement p {
        color: var(--color-text-secondary);
        font-size: var(--font-size-base);
        font-weight: 300;
        line-height: 1.6;
      }

      .waitlist-form {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
        width: 320px;
      }

      .form-row {
        position: relative;
        display: flex;
        align-items: flex-end;
        width: 100%;
      }

      input[type="email"] {
        flex-grow: 1;
        min-width: 0;
        padding: 8px 0;
        border: 0;
        border-bottom: 1px solid var(--color-border-subtle);
        outline: none;
        background: transparent;
        color: var(--color-text-primary);
        font-family: var(--font-family);
        font-size: var(--font-size-base);
        transition: border-color 0.3s ease;
      }

      input[type="email"]::placeholder {
        color: #a0a0a0;
        font-weight: 300;
      }

      input[type="email"]:focus {
        border-bottom-color: var(--color-text-primary);
      }

      button {
        padding: 0 0 8px 16px;
        border: 0;
        border-bottom: 1px solid var(--color-border-subtle);
        background: transparent;
        color: var(--color-text-primary);
        cursor: pointer;
        white-space: nowrap;
        transition: border-color 0.3s ease, opacity 0.3s ease;
      }

      button:hover {
        border-bottom-color: var(--color-text-primary);
      }

      .button-icon {
        display: inline-block;
        transition: transform 0.3s ease;
      }

      button:hover .button-icon {
        transform: translateX(4px);
      }

      input:placeholder-shown + button {
        opacity: 0.5;
        pointer-events: none;
      }

      @media (max-width: 760px) {
        body {
          min-height: 100svh;
          height: 100svh;
        }

        .exhibition-header,
        .exhibition-footer {
          padding: 1.25rem;
        }

        .exhibition-header {
          align-items: flex-start;
        }

        .exhibition-stage::before,
        .exhibition-stage::after {
          width: 12vw;
        }

        .gallery-track {
          gap: 1rem;
          padding: 0 16vw;
        }

        .gallery-item {
          height: min(38vh, 340px);
        }

        .exhibition-footer {
          align-items: stretch;
          flex-direction: column;
          gap: 1.75rem;
        }

        .waitlist-form {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="exhibition-header">
      <div class="text-micro">Vol. 1 &mdash; The Architecture of Silence</div>
      <div class="text-micro">Invitation Only</div>
    </header>

    <main class="exhibition-stage" aria-label="Architecture photography gallery">
      <div class="gallery-track" id="gallery-scroll">
        <img
          src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 1"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 2"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1506143925201-0252c51780b0?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 3"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 4"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 5"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 6"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1600607688969-a5bfcd64bd28?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 7"
          class="gallery-item"
        />
        <img
          src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae?auto=format&amp;fit=crop&amp;w=800&amp;q=80"
          alt="Gallery 8"
          class="gallery-item"
        />
      </div>
    </main>

    <footer class="exhibition-footer">
      <div class="exhibition-statement">
        <h1>A space for thoughtful photography.</h1>
        <p>
          Moving away from the noise of social feeds. We are building a curated environment dedicated
          to visual arts, presentation, and craft. Currently in closed beta.
        </p>
      </div>

      <form class="waitlist-form" id="waitlist-form">
        <label class="text-micro" for="email">Request Access</label>
        <div class="form-row">
          <input
            type="email"
            id="email"
            placeholder="Enter your email address"
            required
            autocomplete="off"
          />
          <button type="submit" class="text-micro">Submit <span class="button-icon">&rarr;</span></button>
        </div>
      </form>
    </footer>

    <script>
      window.addEventListener("load", () => {
        const track = document.getElementById("gallery-scroll");
        const form = document.getElementById("waitlist-form");
        let isDown = false;
        let startX = 0;
        let scrollLeft = 0;

        track.addEventListener(
          "wheel",
          (event) => {
            if (Math.abs(event.deltaY) > Math.abs(event.deltaX)) {
              event.preventDefault();
              track.scrollLeft += event.deltaY;
            }
          },
          { passive: false }
        );

        track.addEventListener("mousedown", (event) => {
          isDown = true;
          track.style.cursor = "grabbing";
          startX = event.pageX - track.offsetLeft;
          scrollLeft = track.scrollLeft;
        });

        track.addEventListener("mouseleave", () => {
          isDown = false;
          track.style.cursor = "grab";
        });

        track.addEventListener("mouseup", () => {
          isDown = false;
          track.style.cursor = "grab";
        });

        track.addEventListener("mousemove", (event) => {
          if (!isDown) return;
          event.preventDefault();
          const x = event.pageX - track.offsetLeft;
          const walk = (x - startX) * 2;
          track.scrollLeft = scrollLeft - walk;
        });

        form.addEventListener("submit", (event) => {
          event.preventDefault();
        });
      });
    </script>
  </body>
</html>
